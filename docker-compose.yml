services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: fxsharing
      POSTGRES_HOST_AUTH_METHOD: trust  # no password required for local dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # No healthcheck — app only uses redis_started condition.
    # Add a healthcheck here when Celery workers are introduced.

  app:
    build: .
    # migrate runs on every `up` — harmless if schema is current
    command: >
      /bin/sh -c "python manage.py migrate &&
                  python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres@db/fxsharing
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  db_data:
