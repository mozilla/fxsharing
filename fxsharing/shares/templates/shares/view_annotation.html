<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ annotation.title }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles/common-shared.css' %}" />
    <link rel="stylesheet" href="{% static 'styles/annotation.css' %}" />
  </head>

  <body>
    <!-- Left sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <img src="{% static 'assets/logo.svg' %}" alt="Firefox" />
        <span>Notes made in Firefox</span>
      </div>

      <div class="notes-section">
        <div class="note-card">
          <div class="note-card-header">
            <span>Annotation</span>
            <span class="note-card-date">{{ annotation.created_at|date:"M d, Y" }}</span>
          </div>
          <div class="note-card-body">
            Page snapshot of <strong>{{ annotation.title }}</strong>
          </div>
        </div>
      </div>

      {% if not is_firefox %}
      <div class="cta-banner">
        <img class="cta-icon" src="{% static 'assets/kit-callout.svg' %}" alt="" />
        <div class="cta-content">
          <div>
            <div class="cta-title">Created with Firefox</div>
            <div class="cta-description">A more private way to roam the web.</div>
          </div>
          <a class="cta-button" href="https://www.mozilla.org/firefox/">Try Firefox</a>
        </div>
      </div>
      {% endif %}
    </div>

    <!-- Right content area -->
    <div class="content-area">
      <div class="content-tab-bar">
        <img src="{% static 'assets/logo.svg' %}" alt="" />
        <a href="{{ annotation.source_url }}" target="_blank" rel="noopener">{{ annotation.source_url }}</a>
      </div>
      <iframe
        class="content-frame"
        sandbox="allow-same-origin"
        srcdoc="{{ annotation.html_content }}"
      ></iframe>
    </div>
  </body>
</html>
