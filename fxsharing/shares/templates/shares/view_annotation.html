<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ annotation.title }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles/common-shared.css' %}" />
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: system-ui, sans-serif;
      }
      .annotation-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: #f5f4f9;
        border-bottom: 1px solid #d2c8ec;
        font-size: 13px;
        color: #584a7d;
        flex-shrink: 0;
      }
      .annotation-header a {
        color: #764edd;
        text-decoration: none;
      }
      .annotation-header a:hover {
        text-decoration: underline;
      }
      .annotation-frame {
        flex: 1;
        border: none;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="annotation-header">
      <span>{{ annotation.title }}</span>
      <span>&mdash;</span>
      <a href="{{ annotation.source_url }}" target="_blank" rel="noopener">{{ annotation.source_url }}</a>
    </div>
    <iframe
      class="annotation-frame"
      sandbox="allow-same-origin"
      srcdoc="{{ annotation.html_content }}"
    ></iframe>
  </body>
</html>
